<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Caveat:wght@400;700&display=swap" rel="stylesheet"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>daily diary ~ kiyomi journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-image: url('journal1.png.jpg'); background-size: cover; background-position: center; min-height: 100vh; font-family: 'Caveat', cursive; padding: 20px; overflow-y: scroll; }
    nav { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    nav a { font-family: 'Fredoka One', cursive; color: white; text-decoration: none; font-size: 1rem; background: rgba(212, 83, 138, 0.7); padding: 6px 16px; border-radius: 30px; transition: transform 0.2s; }
    nav a:hover { transform: scale(1.08); background: #d4538a; }
    h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; color: #7c3aed; text-align: center; margin-bottom: 20px; text-shadow: 3px 3px 0px rgba(255,255,255,0.5); }
    .card { background: rgba(255,255,255,0.88); border: 3px dashed #d4b0f0; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 25px; }
    .date-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .date-row input, .date-row select { font-family: 'Caveat', cursive; font-size: 1rem; padding: 6px 14px; border: 2px solid #d4b0f0; border-radius: 12px; outline: none; background: white; }
    .card label { font-family: 'Fredoka One', cursive; font-size: 1rem; color: #7c3aed; display: block; margin-bottom: 6px; }
    .card textarea { width: 100%; font-family: 'Caveat', cursive; font-size: 1.1rem; padding: 10px; border: 2px solid #d4b0f0; border-radius: 12px; resize: none; outline: none; margin-bottom: 16px; background: white; }
    .stickers { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .sticker-pick { font-size: 1.5rem; cursor: pointer; padding: 4px; border-radius: 8px; border: 2px solid transparent; transition: transform 0.15s; }
    .sticker-pick:hover { transform: scale(1.3); border-color: #d4b0f0; }
    .picked-stickers { min-height: 36px; background: #fff0f8; border-radius: 10px; padding: 6px; margin-bottom: 16px; font-size: 1.4rem; letter-spacing: 3px; border: 2px dashed #f0a0c8; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .save-btn { font-family: 'Fredoka One', cursive; font-size: 1.1rem; background: #d4538a; color: white; border: none; padding: 10px 28px; border-radius: 30px; cursor: pointer; transition: transform 0.2s; }
    .save-btn:hover { transform: scale(1.08); }
    .back-btn { font-family: 'Fredoka One', cursive; font-size: 1.1rem; background: white; color: #7c3aed; border: 2px solid #7c3aed; padding: 10px 28px; border-radius: 30px; cursor: pointer; transition: transform 0.2s; text-decoration: none; display: inline-block; }
    .back-btn:hover { transform: scale(1.08); }
    .entries { margin-top: 24px; }
    .entry-card { background: white; border: 2px solid #f0c0e0; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .entry-card .entry-header { font-family: 'Fredoka One', cursive; color: #d4538a; font-size: 1rem; margin-bottom: 6px; }
    .entry-card .entry-text { font-size: 1.05rem; color: #555; line-height: 1.5; }
    .entry-card .entry-stickers { font-size: 1.2rem; margin-top: 4px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">🏠 home</a>
    <a href="journal.html">📖 journal</a>
    <a href="vision.html">🌈 vision</a>
    <a href="mood.html">🌙 mood</a>
    <a href="playlist.html">🎵 playlist</a>
  </nav>

  <h1>🌸 daily diary</h1>

  <div class="card">
    <div class="date-row">
      <input type="date" id="entryDate" />
      <select id="mood">
        <option>💖 loved</option>
        <option>😊 happy</option>
        <option>🌸 soft</option>
        <option>🌙 chill</option>
        <option>😴 tired</option>
        <option>😤 ugh</option>
        <option>✨ magical</option>
      </select>
    </div>

    <label>📝 dear diary...</label>
    <textarea id="entryText" rows="6" placeholder="write about your day here..."></textarea>

    <label>🌸 add stickers!</label>
    <div class="stickers">
      <span class="sticker-pick" onclick="addSticker('🌸')">🌸</span>
      <span class="sticker-pick" onclick="addSticker('⭐')">⭐</span>
      <span class="sticker-pick" onclick="addSticker('💖')">💖</span>
      <span class="sticker-pick" onclick="addSticker('🎀')">🎀</span>
      <span class="sticker-pick" onclick="addSticker('✨')">✨</span>
      <span class="sticker-pick" onclick="addSticker('🦋')">🦋</span>
      <span class="sticker-pick" onclick="addSticker('🍓')">🍓</span>
      <span class="sticker-pick" onclick="addSticker('🌈')">🌈</span>
      <span class="sticker-pick" onclick="addSticker('💫')">💫</span>
      <span class="sticker-pick" onclick="addSticker('🎵')">🎵</span>
    </div>
    <div class="picked-stickers" id="pickedStickers">tap a sticker to add ~</div>

    <div class="btn-row">
      <button class="save-btn" onclick="saveEntry()">💾 save entry!</button>
      <a href="journal.html" class="back-btn">← back</a>
    </div>

    <div class="entries" id="entriesList"></div>
  </div>

  <script>
    let stickers = [];

    function addSticker(s) {
      stickers.push(s);
      document.getElementById('pickedStickers').textContent = stickers.join(' ');
    }

    function saveEntry() {
      const date = document.getElementById('entryDate').value;
      const mood = document.getElementById('mood').value;
      const text = document.getElementById('entryText').value;
      if (!text) { alert('write something first! 🌸'); return; }
      const entries = JSON.parse(localStorage.getItem('daily_entries') || '[]');
      entries.unshift({ date, mood, text, stickers: [...stickers] });
      localStorage.setItem('daily_entries', JSON.stringify(entries));
      document.getElementById('entryText').value = '';
      stickers = [];
      document.getElementById('pickedStickers').textContent = 'tap a sticker to add ~';
      loadEntries();
      alert('saved!! 💖');
    }

    function loadEntries() {
      const entries = JSON.parse(localStorage.getItem('daily_entries') || '[]');
      const list = document.getElementById('entriesList');
      list.innerHTML = entries.map(e => `
        <div class="entry-card">
          <div class="entry-header">${e.mood} · ${e.date || 'no date'}</div>
          <div class="entry-text">${e.text}</div>
          <div class="entry-stickers">${e.stickers ? e.stickers.join('') : ''}</div>
        </div>
      `).join('');
    }

    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    loadEntries();
  </script>
</body>
</html>
